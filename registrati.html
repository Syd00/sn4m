    <div class="container">
        <h1>Registrati</h1>
        <form id="registerForm" onsubmit="register(event)" class="row g-3">
            <div class="col-md-6">
                <label for="nameInputField" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nameInputField" placeholder="nome">
            </div>
            <div class="col-md-6">
                <label for="surnameInputField" class="form-label">Cognome</label>
                <input type="text" class="form-control" id="surnameInputField" placeholder="cognome">
            </div>
            <div class="col-md-6">
                <label for="usernameInputField" class="form-label">Username</label>
                <input type="text" class="form-control" id="usernameInputField" placeholder="username">
            </div>
            <div class="col-md-6">
                <label for="emailInputField" class="form-label">Email address</label>
                <input type="email" class="form-control" id="emailInputField" placeholder="test@email.it">
            </div>
            <div class="col-md-6">
                <label for="passwordInputField" class="form-label">Password</label>
                <input type="password" class="form-control" id="passwordInputField">
            </div>
            <div class="col-md-6">
                <label for="passwordRepeatInputField" class="form-label">Ripeti password</label>
                <input type="password" class="form-control" id="passwordRepeatInputField">
            </div>

            <div class="col-12">
                Generi preferiti
            </div>
            <div class="col-12" id="checkboxes">
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox1" value="rock">
                    <label class="form-check-label" for="inlineCheckbox1">Rock</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox2" value="pop">
                    <label class="form-check-label" for="inlineCheckbox2">Pop</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="jazz">
                    <label class="form-check-label" for="inlineCheckbox3">Jazz</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="edm">
                    <label class="form-check-label" for="inlineCheckbox3">Edm</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="techno">
                    <label class="form-check-label" for="inlineCheckbox3">Techno</label>
                </div>
                <div class="form-check form-check-inline">
                    <input class="form-check-input" type="checkbox" id="inlineCheckbox3" value="metal">
                    <label class="form-check-label" for="inlineCheckbox3">Metal</label>
                </div>
            </div>
            <div class="col-12 text-center">
                <button type="submit" class="btn btn-primary">Submit</button>
            </div>

        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
