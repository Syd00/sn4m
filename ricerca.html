   <div class="container">
      <h1>Spotify API</h1>

      <select class="form-select" id="resource">
         <option id="srcTrack" value="track">Canzoni</option>
         <option id="srcArtist" value="artist">Artisti</option>
      </select>

      <input class="form-control" type="text" id="search_input" onkeyup="search()"
         placeholder="Cerca almeno 3 caratteri">

      <!--       <button type="button" class="btn btn-primary" onclick="search()">Cerca</button>

      <input class="form-control" id="pagina" type="number" min="1" step="1" max="6000" value="1"
         onchange="cambioPagina();"> -->

      <div id="contenuto_canzoni" class="row">
         <div id="modello_canzoni" class="col-lg-3 col-sm-6 d-none mb-4 ">
            <div class="card h-100">
               <img src="http://i.scdn.co/image/ab67616d0000b273a72cf9dea8027247b5c7536c" class="card-img-top" alt="">
               <div class="card-body">
                  <h5 class="card-title"></h5>
                  <p class="card-artists"></p>
                  <p class="card-duration"></p>
                  <p class="card-album"></p>
               </div>
               <div class="card-footer text-muted">
                  <div class="dropdown">
                     <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Aggiungi a playlist
                     </button>
                     <ul class="dropdown-menu addToPlaylist">
                        <!-- <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>
                        <li><a class="dropdown-item" href="#">Something else here</a></li> -->
                     </ul>
                  </div>

               </div>

            </div>
         </div>
      </div>

      <div id="contenuto_artisti" class="row">
         <div id="modello_artisti" class="col-lg-3 col-sm-6 d-none mb-4 ">
            <div class="card h-100">
               <img src="http://i.scdn.co/image/ab67616d0000b273a72cf9dea8027247b5c7536c" class="card-img-top" alt="">
               <div class="card-body">
                  <h5 class="card-title"></h5>
                  <p class="card-genres"></p>
               </div>
               <div class="card-footer text-muted">
                  <button type="button" class="btn btn-primary artistBtn"
                     onclick="addFavouriteArtist(event)">Preferiti</button>

               </div>

            </div>
         </div>
      </div>
