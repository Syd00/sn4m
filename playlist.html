<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SN4M</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body onload="showPlaylist()">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-sm bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">SN4M</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" aria-current="page" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="ricerca.html">Cerca</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="playlist.html">Playlist</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="profilo.html">Profilo</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="login.html">Login</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="registrati.html">Registrati</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">

        <div id="show">
            <h1>Mostra playlist</h1>
            <div id="playlistButtons" class="d-flex justify-content-between">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown"
                        aria-expanded="false">
                        Scegli playlist
                    </button>
                    <ul class="dropdown-menu" id="playlistSelect">
                        <!-- <li><a class="dropdown-item" href="#">Action</a></li>
                        <li><a class="dropdown-item" href="#">Another action</a></li>
                        <li><a class="dropdown-item" href="#">Something else here</a></li> -->
                    </ul>
                </div>
            </div>

            <div id="playlistHeader"></div>


            <div id="showPlaylist">
                <div id="contenuto_canzoni" class="row">
                    <div id="modello_canzoni" class="col-lg-3 col-sm-6 d-none mb-4 ">
                        <div class="card h-100">
                            <img src="http://i.scdn.co/image/ab67616d0000b273a72cf9dea8027247b5c7536c"
                                class="card-img-top" alt="">
                            <div class="card-body">
                                <h5 class="card-title"></h5>
                                <p class="card-artists"></p>
                                <p class="card-duration"></p>
                                <p class="card-album"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <form id="playlistForm" onsubmit="createPlaylist(event)" class="row g-3">
            <h1>Crea Playlist</h1>
            <div class="col-md-6">
                <label for="name" class="form-label">Nome</label>
                <input type="text" class="form-control" id="name" placeholder="nome">
            </div>
            <div class="col-md-6">
                <label for="tag1" class="form-label">Tag1</label>
                <input type="text" class="form-control tag" id="tag1" placeholder="tag#1">
            </div>
            <div class="col-md-6">
                <label for="tag2" class="form-label">Tag2</label>
                <input type="text" class="form-control tag" id="tag2" placeholder="tag#2">
            </div>
            <div class="col-md-6">
                <label for="tag3" class="form-label">Tag3</label>
                <input type="text" class="form-control tag" id="tag3" placeholder="tag#3">
            </div>
            <div class="col-md-6">
                <label for="tag4" class="form-label">Tag4</label>
                <input type="text" class="form-control tag" id="tag4" placeholder="tag#4">
            </div>
            <div class="col-md-6">
                <label for="tag5" class="form-label">Tag5</label>
                <input type="text" class="form-control tag" id="tag5" placeholder="tag#5">
            </div>
            <div>
                <textarea name="paylistDesc" id="playlistDesc" placeholder="Inserisci descrizione"></textarea>
            </div>
            <div>
                <button type="button" class="btn btn-primary" onclick="createPlaylist()">Crea playlist</button>
            </div>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="js.js"></script>
</body>

</html>
